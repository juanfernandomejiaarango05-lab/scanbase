<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ScanBase QR — Registro & Excel</title>

<!-- ZXing: funciona en iPhone Safari -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/zxing.min.js"></script>
<!-- SheetJS para generar Excel real .xlsx -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg:     #090b0f;
    --bg2:    #0f1218;
    --bg3:    #161b24;
    --border: #1e2530;
    --cyan:   #00e5c0;
    --cyan2:  #00b89a;
    --text:   #dde3ee;
    --muted:  #5a6478;
    --red:    #ff4f5e;
    --green:  #00c97a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 50;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--cyan), #0af);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 20px; height: 20px; color: #000; }
  .logo-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 17px; color: #fff; }
  #counter {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--cyan); background: #001f18; border: 1px solid #00e5c020;
    padding: 4px 12px; border-radius: 20px;
  }

  /* ── Tabs ── */
  nav {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 65px; z-index: 40;
  }
  .tab {
    flex: 1; padding: 13px 10px; border: none; background: none;
    color: var(--muted); font-size: 13px; font-family: 'Inter', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; position: relative; transition: color .2s;
  }
  .tab.active { color: var(--cyan); }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--cyan); border-radius: 2px 2px 0 0;
  }
  .tab svg { width: 16px; height: 16px; }

  /* ── Main ── */
  main { flex: 1; padding: 20px; max-width: 640px; width: 100%; margin: 0 auto; }

  /* ── Panel control ── */
  .panel { display: none; flex-direction: column; gap: 18px; }
  .panel.active { display: flex; }

  /* ── Visor cámara ── */
  #camera-wrapper {
    position: relative; width: 100%; aspect-ratio: 4/3;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
  #cam-placeholder { text-align: center; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #cam-placeholder svg { width: 48px; height: 48px; opacity: .3; }
  #cam-placeholder p { font-size: 13px; }

  /* Laser */
  #laser {
    position: absolute; left: 8%; width: 84%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 10px var(--cyan);
    display: none; z-index: 10;
    animation: laserMove 1.8s ease-in-out infinite;
  }
  @keyframes laserMove {
    0%   { top: 10%; }
    50%  { top: 88%; }
    100% { top: 10%; }
  }
  /* Esquinas */
  .corner {
    position: absolute; width: 22px; height: 22px; z-index: 5;
    display: none;
  }
  #c-tl { top:10px; left:10px;  border-top: 2.5px solid var(--cyan); border-left: 2.5px solid var(--cyan); }
  #c-tr { top:10px; right:10px; border-top: 2.5px solid var(--cyan); border-right: 2.5px solid var(--cyan); }
  #c-bl { bottom:10px; left:10px;  border-bottom: 2.5px solid var(--cyan); border-left: 2.5px solid var(--cyan); }
  #c-br { bottom:10px; right:10px; border-bottom: 2.5px solid var(--cyan); border-right: 2.5px solid var(--cyan); }

  /* Botones cámara */
  .cam-actions { display: flex; gap: 10px; }

  /* ── Botones ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 18px; border-radius: 10px; border: none;
    font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 600;
    cursor: pointer; transition: all .15s; width: 100%;
  }
  .btn svg { width: 17px; height: 17px; flex-shrink: 0; }
  .btn-primary { background: var(--cyan); color: #000; }
  .btn-primary:active { background: var(--cyan2); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:active { background: #1e2530; }
  .btn-danger  { background: #2a1015; color: var(--red); border: 1px solid #ff4f5e30; }
  .btn-green   { background: #001a10; color: var(--green); border: 1px solid #00c97a30; }
  .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; border-radius: 8px; }

  /* ── Divisor ── */
  .divider { text-align: center; font-size: 11px; color: #2a3040; font-family: 'JetBrains Mono', monospace; }

  /* ── Formulario ── */
  label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    transition: border-color .2s; appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }

  /* ── Último registro ── */
  #last-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; display: none;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .last-title { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 6px; }
  .last-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--cyan); word-break: break-all; margin-bottom: 8px; }
  .last-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .chip  { font-size: 10px; background: #001f18; color: var(--cyan); border: 1px solid #00e5c015; padding: 3px 9px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; }
  .chip2 { font-size: 10px; background: #12103a; color: #8b9dff; border: 1px solid #8b9dff15; padding: 3px 9px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; }
  .ts { font-size: 10px; color: #333; font-family: 'JetBrains Mono', monospace; margin-left: auto; }

  /* ── DB Panel ── */
  .db-toolbar { display: flex; gap: 10px; align-items: center; }
  .db-toolbar input { flex: 1; }
  #db-count { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* Tabla */
  #table-wrap { display: flex; flex-direction: column; gap: 1px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .table-head {
    display: flex; gap: 8px; padding: 9px 14px;
    font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: .5px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .record {
    display: flex; gap: 8px; padding: 12px 14px;
    background: var(--bg); border-bottom: 1px solid #0d1018;
    align-items: flex-start;
    animation: slideIn .2s ease both;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(-5px); } to { opacity:1; transform:translateX(0); } }
  .record:last-child { border-bottom: none; }
  .col-code { flex: 3; }
  .col-cat  { flex: 1.2; }
  .col-date { flex: 2; }
  .col-del  { flex: none; width: 32px; display: flex; align-items: center; justify-content: center; }
  .rec-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; word-break: break-all; color: var(--text); }
  .rec-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .rec-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #333; }
  .del-btn  { background: none; border: none; color: #2a3040; cursor: pointer; padding: 4px; border-radius: 6px; transition: color .15s; }
  .del-btn:hover { color: var(--red); }
  .del-btn svg { width: 15px; height: 15px; }

  #empty-state { display: none; padding: 50px 20px; text-align: center; color: var(--muted); font-size: 14px; }
  #empty-state svg { width: 40px; height: 40px; opacity: .25; margin-bottom: 12px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 12px 22px; border-radius: 10px; font-size: 13px;
    font-family: 'JetBrains Mono', monospace; z-index: 200;
    opacity: 0; transition: opacity .25s; pointer-events: none;
    white-space: nowrap; max-width: 90vw; text-align: center;
    border: 1px solid;
  }
  #toast.show { opacity: 1; }
  #toast.ok  { background: #0a1f18; border-color: var(--green); color: var(--green); }
  #toast.err { background: #1f0a0d; border-color: var(--red);   color: var(--red); }

  /* Beep visual */
  #camera-wrapper.flash { animation: flashGreen .3s ease; }
  @keyframes flashGreen {
    0%   { box-shadow: 0 0 0 0 rgba(0,201,122,.6); }
    50%  { box-shadow: 0 0 0 16px rgba(0,201,122,.2); }
    100% { box-shadow: 0 0 0 0 rgba(0,201,122,0); }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .table-head, .record { padding: 10px; }
    .col-date { display: none; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
      </div>
      <span class="logo-text">ScanBase</span>
    </div>
    <div id="counter">0 registros</div>
  </header>

  <!-- Tabs -->
  <nav>
    <button class="tab active" onclick="switchTab('scan')" id="tab-scan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h3v3H7z"/><path d="M14 7h3v3h-3z"/><path d="M7 14h3v3H7z"/><path d="M14 14h.01"/><path d="M17 14h.01"/><path d="M14 17h.01"/><path d="M17 17h.01"/>
      </svg>
      Escanear
    </button>
    <button class="tab" onclick="switchTab('db')" id="tab-db">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      </svg>
      Base de Datos
    </button>
  </nav>

  <main>

    <!-- ── PANEL ESCANEAR ── -->
    <div class="panel active" id="panel-scan">

      <!-- Visor -->
      <div id="camera-wrapper">
        <video id="preview" autoplay playsinline muted></video>
        <div id="laser"></div>
        <div class="corner" id="c-tl"></div>
        <div class="corner" id="c-tr"></div>
        <div class="corner" id="c-bl"></div>
        <div class="corner" id="c-br"></div>
        <div id="cam-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M7 7h3v3H7z"/><path d="M14 7h3v3h-3z"/><path d="M7 14h3v3H7z"/>
          </svg>
          <p>Toca <strong>Activar Cámara</strong> para escanear</p>
          <p style="font-size:11px;opacity:.5;margin-top:4px;">Compatible con iPhone Safari</p>
        </div>
      </div>

      <!-- Acciones cámara -->
      <div class="cam-actions">
        <button class="btn btn-primary" id="btn-cam" onclick="toggleCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          Activar Cámara
        </button>
      </div>

      <!-- Separador -->
      <div class="divider">— o ingresa el código manualmente —</div>

      <!-- Formulario manual -->
      <div>
        <label>Código (QR / Barras / Texto)</label>
        <input type="text" id="inp-code" placeholder="Pega o escribe el código…">
      </div>

      <div class="row">
        <div>
          <label>Categoría</label>
          <select id="inp-cat">
            <option>General</option>
            <option>Producto</option>
            <option>Inventario</option>
            <option>Activo</option>
            <option>Documento</option>
            <option>Otro</option>
          </select>
        </div>
        <div>
          <label>Nota (opcional)</label>
          <input type="text" id="inp-note" placeholder="Descripción…">
        </div>
      </div>

      <button class="btn btn-primary" onclick="registerManual()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Registrar en Base de Datos
      </button>

      <!-- Último escaneado -->
      <div id="last-card">
        <div class="last-title">✓ Último registrado</div>
        <div class="last-code" id="last-code">—</div>
        <div class="last-meta">
          <span class="chip" id="last-cat">—</span>
          <span class="ts" id="last-ts">—</span>
        </div>
        <div style="margin-top:8px;font-size:12px;color:#5a6478;" id="last-note"></div>
      </div>

    </div><!-- /panel-scan -->

    <!-- ── PANEL BASE DE DATOS ── -->
    <div class="panel" id="panel-db">

      <div class="db-toolbar">
        <input type="text" id="search-inp" placeholder="Buscar por código, nota, categoría…" oninput="renderTable()">
        <button class="btn btn-green btn-sm" onclick="exportExcel()" style="width:auto;white-space:nowrap;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Excel
        </button>
        <button class="btn btn-danger btn-sm" onclick="clearAll()" style="width:auto;white-space:nowrap;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          Limpiar
        </button>
      </div>

      <div id="db-count">0 registros</div>

      <div id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        <p>Sin registros aún.</p>
        <p style="font-size:11px;margin-top:4px;opacity:.5;">Escanea o ingresa un código para empezar.</p>
      </div>

      <div id="table-wrap" style="display:none;">
        <div class="table-head">
          <div class="col-code">Código / Nota</div>
          <div class="col-cat">Categoría</div>
          <div class="col-date">Fecha y Hora</div>
          <div class="col-del"></div>
        </div>
        <div id="records-body"></div>
      </div>

    </div><!-- /panel-db -->

  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────
const DB_KEY = 'scanbase_v2';
let records = [];
let cameraOn = false;
let codeReader = null;
let currentStream = null;
let scanCooldown = false;

// ─────────────────────────────────────────────
//  PERSISTENCIA
// ─────────────────────────────────────────────
function loadDB() {
  try { records = JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch { records = []; }
}
function saveDB() {
  localStorage.setItem(DB_KEY, JSON.stringify(records));
}

// ─────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'db') renderTable();
}

// ─────────────────────────────────────────────
//  CÁMARA + ZXing (funciona en iPhone Safari)
// ─────────────────────────────────────────────
async function toggleCamera() {
  if (cameraOn) {
    stopCamera();
  } else {
    await startCamera();
  }
}

async function startCamera() {
  try {
    const ZXing = window.ZXingBrowser || window.ZXing;
    if (!ZXing) { showToast('Librería ZXing no cargó. Intenta recargar.', 'err'); return; }

    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.PDF_417,
      ZXing.BarcodeFormat.ITF,
    ].filter(Boolean);
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

    codeReader = new ZXing.BrowserMultiFormatReader(hints);

    const videoEl = document.getElementById('preview');
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 },
      }
    };

    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = currentStream;
    await videoEl.play();

    videoEl.style.display = 'block';
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('laser').style.display = 'block';
    document.querySelectorAll('.corner').forEach(c => c.style.display = 'block');

    cameraOn = true;
    document.getElementById('btn-cam').innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px;"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 0 1-2-2V8m0-3V5a2 2 0 0 1 2-2h3m12.121 3H21a2 2 0 0 1 2 2v11.121"/><path d="M15 9a3 3 0 0 1 .121 6.121"/></svg>
      Detener Cámara`;

    // Escaneo continuo
    codeReader.decodeFromVideoElement(videoEl, (result, err) => {
      if (result && !scanCooldown) {
        scanCooldown = true;
        onCodeDetected(result.getText(), result.getBarcodeFormat?.() || 'QR');
        setTimeout(() => { scanCooldown = false; }, 2500);
      }
    });

  } catch(e) {
    let msg = 'No se pudo acceder a la cámara.';
    if (e.name === 'NotAllowedError') msg = 'Permiso de cámara denegado. Revisa ajustes.';
    if (e.name === 'NotFoundError')   msg = 'No se encontró cámara en el dispositivo.';
    showToast(msg, 'err');
  }
}

function stopCamera() {
  if (codeReader) { try { codeReader.reset(); } catch {} codeReader = null; }
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  const v = document.getElementById('preview');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('laser').style.display = 'none';
  document.querySelectorAll('.corner').forEach(c => c.style.display = 'none');
  cameraOn = false;
  document.getElementById('btn-cam').innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px;"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    Activar Cámara`;
}

// ─────────────────────────────────────────────
//  REGISTRO
// ─────────────────────────────────────────────
function onCodeDetected(code, format) {
  // Flash visual
  const wrapper = document.getElementById('camera-wrapper');
  wrapper.classList.remove('flash');
  void wrapper.offsetWidth;
  wrapper.classList.add('flash');

  const cat = document.getElementById('inp-cat').value;
  addRecord(code, cat, `Auto: ${format}`);
}

function registerManual() {
  const code = document.getElementById('inp-code').value.trim();
  if (!code) { showToast('El código no puede estar vacío', 'err'); return; }
  const cat  = document.getElementById('inp-cat').value;
  const note = document.getElementById('inp-note').value.trim();
  addRecord(code, cat, note);
  document.getElementById('inp-code').value = '';
  document.getElementById('inp-note').value = '';
}

function addRecord(code, category, note) {
  const rec = {
    id: Date.now().toString() + Math.random().toString(36).slice(2,6),
    code,
    category,
    note,
    timestamp: new Date().toISOString(),
  };
  records.unshift(rec);
  saveDB();
  updateCounter();
  showLastCard(rec);
  showToast('✓ Registrado correctamente', 'ok');
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  saveDB();
  updateCounter();
  renderTable();
}

function clearAll() {
  if (!confirm('¿Eliminar todos los registros?')) return;
  records = [];
  saveDB();
  updateCounter();
  renderTable();
  document.getElementById('last-card').style.display = 'none';
  showToast('Base de datos limpiada', 'ok');
}

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function updateCounter() {
  document.getElementById('counter').textContent = `${records.length} registro${records.length !== 1 ? 's' : ''}`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString('es-MX', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function showLastCard(rec) {
  document.getElementById('last-card').style.display = 'block';
  document.getElementById('last-code').textContent = rec.code;
  document.getElementById('last-cat').textContent  = rec.category;
  document.getElementById('last-ts').textContent   = formatDate(rec.timestamp);
  document.getElementById('last-note').textContent = rec.note || '';
}

// ─────────────────────────────────────────────
//  TABLA
// ─────────────────────────────────────────────
function renderTable() {
  const q = (document.getElementById('search-inp').value || '').toLowerCase();
  const filtered = records.filter(r =>
    r.code.toLowerCase().includes(q) ||
    (r.note || '').toLowerCase().includes(q) ||
    r.category.toLowerCase().includes(q)
  );

  const body = document.getElementById('records-body');
  const empty = document.getElementById('empty-state');
  const wrap  = document.getElementById('table-wrap');

  document.getElementById('db-count').textContent = `${filtered.length} de ${records.length} registros`;

  if (filtered.length === 0) {
    wrap.style.display  = 'none';
    empty.style.display = 'flex';
    empty.style.flexDirection = 'column';
    empty.style.alignItems = 'center';
    return;
  }
  empty.style.display = 'none';
  wrap.style.display  = 'flex';

  body.innerHTML = filtered.map((r, i) => `
    <div class="record" style="animation-delay:${i*20}ms">
      <div class="col-code">
        <div class="rec-code">${escHtml(r.code.length > 50 ? r.code.slice(0,50)+'…' : r.code)}</div>
        ${r.note ? `<div class="rec-note">${escHtml(r.note)}</div>` : ''}
      </div>
      <div class="col-cat"><span class="chip">${escHtml(r.category)}</span></div>
      <div class="col-date"><div class="rec-date">${formatDate(r.timestamp)}</div></div>
      <div class="col-del">
        <button class="del-btn" onclick="deleteRecord('${r.id}')" title="Eliminar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  EXPORTAR A EXCEL (.xlsx real)
// ─────────────────────────────────────────────
function exportExcel() {
  if (records.length === 0) { showToast('No hay registros para exportar', 'err'); return; }

  const wb = XLSX.utils.book_new();

  // Hoja 1: Datos
  const rows = records.map((r, i) => ({
    'N°':        i + 1,
    'Código':    r.code,
    'Categoría': r.category,
    'Nota':      r.note || '',
    'Fecha':     formatDate(r.timestamp),
    'Timestamp': r.timestamp,
    'ID':        r.id,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);

  // Anchos de columna
  ws['!cols'] = [
    { wch: 5 }, { wch: 45 }, { wch: 14 }, { wch: 25 },
    { wch: 20 }, { wch: 25 }, { wch: 22 }
  ];

  // Estilo cabecera (color verde oscuro)
  const headers = ['A1','B1','C1','D1','E1','F1','G1'];
  headers.forEach(ref => {
    if (ws[ref]) {
      ws[ref].s = {
        fill: { fgColor: { rgb: '003D2B' } },
        font: { bold: true, color: { rgb: '00E5C0' } },
        alignment: { horizontal: 'center' }
      };
    }
  });

  XLSX.utils.book_append_sheet(wb, ws, 'Registros');

  // Hoja 2: Resumen por categoría
  const catMap = {};
  records.forEach(r => { catMap[r.category] = (catMap[r.category] || 0) + 1; });
  const summary = Object.entries(catMap).map(([cat, cnt]) => ({
    'Categoría': cat, 'Total': cnt,
    '% del total': ((cnt / records.length) * 100).toFixed(1) + '%'
  }));
  const ws2 = XLSX.utils.json_to_sheet(summary);
  ws2['!cols'] = [{ wch: 16 }, { wch: 10 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen');

  // Descargar
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `ScanBase_${fecha}.xlsx`);
  showToast(`✓ Excel descargado (${records.length} registros)`, 'ok');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadDB();
updateCounter();
if (records.length > 0) showLastCard(records[0]);
</script>
</body>
</html>
